<div class="dashboard-container">

  <aside class="sidebar">
    <app-sidebar></app-sidebar>
  </aside>

  <main class="content">

    <app-header></app-header>

    <div class="knowledge-tree">

      <div class="tree-container">

        <img
          src="/images/sakura-tree.png"
          alt="Knowledge Tree"
          class="tree-image"
        />

        <div class="course-circle web">
          {{ courses[0]?.title || 'Angular Fundamentals' }}
        </div>

        <div class="course-circle database">
          {{ courses[1]?.title || 'Advanced Angular' }}
        </div>

        <div class="course-circle cloud">
          {{ courses[2]?.title || 'NodeJS Bootcamp' }}
        </div>

        <div class="course-circle ai">
          {{ courses[0]?.level || 'Beginner' }}
        </div>

      </div>

    </div>

    <app-dashboard-stats></app-dashboard-stats>

  </main>

</div>
